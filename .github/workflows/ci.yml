name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Test
        run: uv run pytest -q
